<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

<h2>Add Student</h2>

<input id="name" placeholder="Name">
<input id="roll" placeholder="Roll Number">
<input id="year" placeholder="Year">
<input id="dept" placeholder="Department">
<input id="section" placeholder="Section">
<input id="uid" placeholder="RFID UID">
<input id="busId" placeholder="Bus ID">
<input id="parent_email" placeholder="Parent Email">

<button onclick="addStudent()">Add Student</button>

<h2>Student List</h2>

<div class="table-wrapper">
<table id="studentsTable"></table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, remove, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSy...",
databaseURL:"https://bus-attendance-84df2-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.addStudent = function(){

const uid=document.getElementById("uid").value;

set(ref(db,"students/"+uid),{
name:document.getElementById("name").value,
roll:document.getElementById("roll").value,
year:document.getElementById("year").value,
dept:document.getElementById("dept").value,
section:document.getElementById("section").value,
busId:document.getElementById("busId").value,
parent_email:document.getElementById("parent_email").value
});

alert("Added");

};

const table=document.getElementById("studentsTable");

onValue(ref(db,"students"),(snapshot)=>{

table.innerHTML=`<tr>
<th>Name</th><th>Roll</th><th>Year</th>
<th>Dept</th><th>Section</th><th>UID</th>
<th>Bus</th><th>Email</th>
</tr>`;

snapshot.forEach((child)=>{

const s=child.val();
const uid=child.key;

table.innerHTML+=`
<tr>
<td>${s.name}</td>
<td>${s.roll}</td>
<td>${s.year}</td>
<td>${s.dept}</td>
<td>${s.section}</td>
<td>${uid}</td>
<td>${s.busId}</td>
<td>${s.parent_email}</td>
</tr>`;

});

});

</script>

</body>
</html>
